{{ define "main" }}
<section class="site-contact">
  <div class="container">
    <div class="row">
      <div class="col-lg-5">
        <h1 class="site-contact-title">
          {{ .Params.heading | safeHTML }}
        </h1>
      </div>
      <div class="col-lg-6 ml-auto">
        <div class="site-contact-form">
          <h4>{{ .Params.form_heading }}</h4>

          <form method="post" accept-charset="UTF-8" action="https://mail-mgmt.nokware.net/api/public/contact">
            <input type="hidden" name="source" value="nokware.net-contact" />
            <input type="hidden" name="source_url" value="https://nokware.net/contact/" />
            <input type="hidden" name="redirect" value="https://nokware.net/contact/?submitted=true" />
            <input type="text" name="company" tabindex="-1" autocomplete="off" aria-hidden="true" style="position:absolute;left:-9999px" />

            <div class="row">
              <div class="col-lg-12">
                <input type="text" name="name" class="form-control" placeholder="Name" required />
              </div>

              <div class="col-lg-12">
                <input type="email" name="email" class="form-control" placeholder="Email" required />
              </div>

              <div class="col-lg-12 select-wrapper">
                <select name="project_type" class="form-control">
                  <option value="" disabled selected hidden>Project Type</option>
                  <option value="Application Design">Application Design</option>
                  <option value="Consultation">Consultation</option>
                  <option value="Server Build">Server Build</option>
                  <option value="Web Design">Web Design</option>
                  <option value="Autonomous Agentic Development Teams">Autonomous Agentic Development Teams</option>
                  <option value="Email Infrastructure">Email Infrastructure</option>
                </select>
              </div>

              <div class="col-12">
                <textarea name="about_project" class="form-control" placeholder="About the project" rows="4"></textarea>
              </div>

              <div class="col-12">
                <button type="submit" class="btn btn-primary">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{{ end }}
